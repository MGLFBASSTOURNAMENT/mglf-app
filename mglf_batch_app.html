<!DOCTYPE html>
<html lang="ja">
<head>

<link rel="manifest" href="manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('オフラインモード準備完了'))
      .catch((err) => console.log('登録失敗:', err));
  }
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MGLF釣果報告・一括送信App1.0</title>
    
    <!-- iPhone (iOS) ホーム画面追加用のアイコン指定 -->
    <link rel="apple-touch-icon" href="appstore.png">
    
    <!-- Android (Chrome等) ホーム画面追加用のアイコン指定 -->
    <link rel="icon" type="image/png" sizes="192x192" href="playstore.png">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        body { background-color: #f0f8ff; font-family: sans-serif; color: #333; padding: 10px; }
        h2 { color: blue; border-bottom: 2px solid blue; padding-bottom: 5px; font-size: 18px; margin-top: 5px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 3px; }
        input[type="text"], input[type="number"] { font-size: 16px; width: 100%; max-width: 200px; height: 2.2em; box-sizing: border-box; padding: 5px; }
        input[type="button"] { font-size: 16px; height: 2.5em; margin-top: 10px; cursor: pointer; }
        .btn-submit { background-color: #4CAF50; color: white; border: none; width: 48%; }
        .btn-clear { background-color: #f44336; color: white; border: none; width: 48%; }
        .btn-sync { background-color: #ff9800; color: white; border: none; width: 100%; font-weight: bold; margin-top: 15px; height: 3em; }
        hr { border: 0; border-top: 1px solid #ccc; margin: 15px 0; }
        .ranking-box { background-color: white; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .rank-item { font-size: 16px; margin-bottom: 5px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .error-msg { color: red; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .success-msg { color: green; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .log-box { margin-top: 15px; font-size: 12px; color: #666; background: #e9e9e9; padding: 8px; border-radius: 4px; max-height: 120px; overflow-y: auto; }
        .badge { background-color: #de1212; color: white; padding: 2px 6px; border-radius: 10px; font-size: 12px; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

    <h2>MGLF釣果報告 (一括送信対応版)1.0</h2>
    <p style="font-size: 12px; color: #555;">ダムではそのまま入力。電波がつながったら下の「一括同期」を押してください。</p>

    <div class="form-group">
        <label>名前 (最大4文字)</label>
        <input type="text" id="namae" maxlength="4" placeholder="例: 中鼻">
    </div>
    <div class="form-group">
        <label>重量 (g)</label>
        <input type="number" id="weight" placeholder="例: 1240">
    </div>
    <div class="form-group">
        <label>サイズ (cm)</label>
        <input type="number" id="cm" placeholder="例: 45">
    </div>

    <div>
        <input type="button" class="btn-submit" value="現場で入力" onclick="addData()">
        <input type="button" class="btn-clear" value="データクリア" onclick="clearAllData()">
    </div>

    <div id="msg_area"></div>

    <!-- 電波がつながったときに押すボタン -->
    <input type="button" class="btn-sync" value=" 電波復帰時にサーバーへ一括同期 " onclick="syncToServer()">
    <div id="sync_status" style="font-size: 12px; font-weight: bold; margin-top: 5px;"></div>

    <hr>

    <h3>現場での暫定順位（3匹重量制）</h3>
    <div class="ranking-box" id="ranking_area">
        <font size="2" color="blue">まだ誰も釣れていません</font>
    </div>

    <div id="time_area" style="font-size: 13px; margin-top: 10px; font-weight: bold;"></div>

    <hr>
    <h3>未送信の釣果履歴 <span id="unsent_count" class="badge" style="display:none;">0</span></h3>
    <div class="log-box" id="log_area">履歴はありません</div>

    <script>
        // CGIのパス（実際の環境に合わせて調整してください）
        const CGI_URL = "https://park22.wakwak.com/~mglf/cgi-bin/mglf2.cgi";

        // ローカル保存データ
        let fishRecords = JSON.parse(localStorage.getItem('mglf_batch_records')) || [];

        // 起動時描画
        updateDisplay();

        function addData() {
            const nameInput = document.getElementById('namae').value.trim();
            const weightInput = parseInt(document.getElementById('weight').value);
            const cmInput = document.getElementById('cm').value.trim();
            const msgArea = document.getElementById('msg_area');
            
            msgArea.className = "error-msg";
            msgArea.innerHTML = ""; 

            if (!nameInput) { msgArea.innerHTML = "名前が入力されていません。"; return; }
            if (isNaN(weightInput)) { msgArea.innerHTML = "g（重量）が入力されていません。"; return; }
            if (weightInput < 400) { msgArea.innerHTML = "キーパー外（400g未満）です。"; return; }
            if (!cmInput) { msgArea.innerHTML = "cm（サイズ）が入力されていません。"; return; }

            // status: 0 (未送信), 1 (送信済)
            fishRecords.push({
                name: nameInput,
                weight: weightInput,
                cm: cmInput,
                time: getNowTimeString(),
                status: 0 
            });

            localStorage.setItem('mglf_batch_records', JSON.stringify(fishRecords));

            document.getElementById('weight').value = "";
            document.getElementById('cm').value = "";

            msgArea.className = "success-msg";
            msgArea.innerHTML = "釣果データをローカルに保存しました！";
            
            updateDisplay();
        }

        function updateDisplay() {
            const rankingArea = document.getElementById('ranking_area');
            const timeArea = document.getElementById('time_area');
            const logArea = document.getElementById('log_area');
            const badge = document.getElementById('unsent_count');

            if (fishRecords.length === 0) {
                rankingArea.innerHTML = '<font size="2" color="blue">まだ誰も釣れていません</font>';
                timeArea.innerHTML = "";
                logArea.innerHTML = "履歴はありません";
                badge.style.display = "none";
                return;
            }

            // 未送信カウント
            let unsent = fishRecords.filter(r => r.status === 0).length;
            if (unsent > 0) {
                badge.innerText = unsent;
                badge.style.display = "inline-block";
            } else {
                badge.style.display = "none";
            }

            // 履歴
            let logHtml = "";
            for(let i = fishRecords.length - 1; i >= 0; i--) {
                let r = fishRecords[i];
                let stLabel = r.status === 1 ? "<span style='color:green;'>[同期済]</span>" : "<span style='color:red;font-weight:bold;'>[未送信]</span>";
                logHtml += `${stLabel} ${r.name}: ${r.cm}cm / ${r.weight}g (${r.time})<br>`;
            }
            logArea.innerHTML = logHtml;

            // ランキングロジック
            let userWeights = {};
            fishRecords.forEach(r => {
                if (!userWeights[r.name]) userWeights[r.name] = [];
                userWeights[r.name].push(r.weight);
            });

            let rankingData = [];
            for (let name in userWeights) {
                let weights = userWeights[name].sort((a, b) => b - a);
                let top3 = weights.slice(0, 3);
                let totalWeight = top3.reduce((sum, w) => sum + w, 0);
                rankingData.push({ name: name, total: totalWeight, details: top3.join("   ") + "   " });
            }
            rankingData.sort((a, b) => b.total - a.total);

            let rankHtml = "3匹重量制<br>";
            rankingData.forEach((data, index) => {
                rankHtml += `<div class="rank-item">${index + 1}位 ${data.name} <b>${data.total}</b>g <b>(${data.details})</b></div>`;
            });

            rankingArea.innerHTML = rankHtml;
            timeArea.innerHTML = getNowTimeString() + " 現在";
        }

  function syncToServer() {
    let unsentRecords = fishRecords.filter(r => r.status === 0);

    if (unsentRecords.length === 0) {
        alert("未送信のデータはありません。");
        return;
    }

    // 1件目のデータを取り出す
    let record = unsentRecords[0];

    // WAKWAKのCGIへデータを送るための、見えないフォームを作る
    let form = document.createElement('form');
    form.method = 'POST';
    form.action = 'http://park22.wakwak.com/~mglf/cgi-bin/mglf2.cgi';
    // 👇ここを修正！CGIがUTF-8で待っているので、UTF-8で送信します
    form.acceptCharset = 'UTF-8';

    // 名前 (namae)
    let inputNamae = document.createElement('input');
    inputNamae.type = 'hidden';
    inputNamae.name = 'namae';
    inputNamae.value = record.name;
    form.appendChild(inputNamae);

    // 重量 (g)
    let inputG = document.createElement('input');
    inputG.type = 'hidden';
    inputG.name = 'g';
    inputG.value = record.weight;
    form.appendChild(inputG);

    // サイズ (cm)
    let inputCm = document.createElement('input');
    inputCm.type = 'hidden';
    inputCm.name = 'cm';
    inputCm.value = record.cm;
    form.appendChild(inputCm);

    // 送るデータを「送信済(1)」にして保存する
    record.status = 1;
    localStorage.setItem('mglf_batch_records', JSON.stringify(fishRecords));

    // フォームを画面に追加して送信！
    document.body.appendChild(form);
    form.submit();
}



        function clearAllData() {
            if (confirm("端末内のデータをすべて削除します。よろしいですか？（サーバーのデータは消えません）")) {
                fishRecords = [];
                localStorage.removeItem('mglf_batch_records');
                updateDisplay();
                document.getElementById('msg_area').innerHTML = "";
                document.getElementById('sync_status').innerHTML = "";
            }
        }

        function getNowTimeString() {
            const now = new Date();
            return `${String(now.getFullYear()).slice(-2)}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}(${['日','月','火','水','木','金','土'][now.getDay()]})${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }
    </script>
<!-- ここから追加 -->
    <hr>
    <div style="margin-top: 15px; margin-bottom: 20px;">
        <input type="button" value=" MGLFトップページへ戻る " onclick="location.href='https://park22.wakwak.com/~mglf/'" style="background-color: #6c757d; color: white; border: none; width: 100%; font-weight: bold; height: 3em; cursor: pointer; font-size: 16px; border-radius: 4px;">
    </div>
    <!-- ここまで追加 -->
</body>
</html>
